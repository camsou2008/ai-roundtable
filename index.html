<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />
    <title>圆桌 · AI 聊天房间</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="房间列表">
        <div class="brand-row">
          <div class="brand-mark" aria-hidden="true">圆</div>
          <div>
            <strong>圆桌</strong>
            <span>AI discussion room</span>
          </div>
        </div>

        <button class="new-room-button" id="new-room-button" type="button">
          <span aria-hidden="true">＋</span>
          新建房间
        </button>

        <div class="sidebar-label">最近房间</div>
        <nav class="room-list" id="room-list" aria-label="最近房间"></nav>

        <div class="connection-panel">
          <div class="connection-title">本机连接</div>
          <div class="connection-row">
            <span class="status-dot" id="codex-dot"></span>
            <span>Codex</span>
            <small id="codex-version">检查中</small>
          </div>
          <div class="connection-row">
            <span class="status-dot" id="hermes-dot"></span>
            <span>Hermes</span>
            <small id="hermes-version">检查中</small>
          </div>
        </div>
      </aside>

      <main class="main-stage">
        <header class="room-header">
          <button class="mobile-menu" id="mobile-menu" type="button" aria-label="打开房间列表">☰</button>
          <div class="room-heading">
            <div class="room-kicker"><span class="live-dot"></span>讨论进行中</div>
            <h1 id="room-title">未命名房间</h1>
          </div>
          <div class="participant-stack" aria-label="房间参与者">
            <span class="avatar avatar-user" title="你">你</span>
            <span class="avatar avatar-codex" title="Codex">C</span>
            <span class="avatar avatar-hermes" title="Hermes">H</span>
          </div>
          <button class="header-action" id="edit-topic-button" type="button">编辑主题</button>
        </header>

        <section class="conversation" id="conversation" aria-live="polite"></section>

        <footer class="composer-wrap">
          <div class="composer">
            <div class="target-tabs" role="group" aria-label="选择发言对象">
              <button class="target-tab active" type="button" data-target="all">@ 全体</button>
              <button class="target-tab" type="button" data-target="codex">@ Codex</button>
              <button class="target-tab" type="button" data-target="hermes">@ Hermes</button>
            </div>
            <textarea
              id="message-input"
              rows="1"
              maxlength="12000"
              placeholder="说点什么，或点名一位参与者…"
              aria-label="聊天消息"
            ></textarea>
            <div class="composer-bottom">
              <span id="composer-hint">Enter 发送 · Shift + Enter 换行</span>
              <button class="send-button" id="send-button" type="button" aria-label="发送消息">发送 <span>↗</span></button>
            </div>
          </div>
        </footer>
      </main>
    </div>

    <dialog id="topic-dialog">
      <form method="dialog" id="topic-form">
        <div class="dialog-kicker">新讨论</div>
        <h2>这次聊什么？</h2>
        <label for="topic-input">讨论主题</label>
        <input id="topic-input" maxlength="120" required placeholder="例如：AI 应不应该拥有长期记忆？" />
        <div class="topic-suggestions" aria-label="推荐主题">
          <button type="button">AI 应不应该拥有长期记忆？</button>
          <button type="button">一个人公司该如何使用 AI Agent？</button>
          <button type="button">未来的软件还需要界面吗？</button>
        </div>
        <div class="dialog-actions">
          <button class="secondary-button" value="cancel" type="button" id="cancel-dialog">取消</button>
          <button class="primary-button" value="default" type="submit">创建并开始</button>
        </div>
      </form>
    </dialog>

    <template id="message-template">
      <article class="message">
        <div class="message-avatar avatar"></div>
        <div class="message-content">
          <div class="message-meta">
            <strong></strong>
            <time></time>
          </div>
          <div class="message-text"></div>
        </div>
      </article>
    </template>

    <script type="module" src="./app.js"></script>
  </body>
</html>
